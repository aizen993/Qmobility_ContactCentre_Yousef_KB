  {q:"How can I contact customer support?", a:"<p>For support, please contact customer care at <a href=\"/cdn-cgi/l/email-protection#98fbedebecf7f5fdeab6fbf9eafdd8e9f5f7faf1f4f1ece1b6f9fd\"><span class=\"__cf_email__\" data-cfemail=\"7615030502191b1304581517041336071b19141f1a1f020f581713\">[email&#160;protected]</span></a>.</p>\n<p>Or call <strong>8003009</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking How can I contact customer support", id:"FAQ-0282", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What is the People of Determination Parking Permit Inquiry System?", a:"<p>This is a system designed to manage parking spaces for People of Determination in malls and private entities, ensuring optimal use of the parking spaces.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What is the People of Determination Parking Permit Inquiry System", id:"FAQ-0286", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What are the delivery vehicle parking hours?", a:"<p>This is dependent on each individual private parking operator's rules, however in most instances delivery vehicles can park for free between <strong>6:00 AM and 8:00 AM</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What are the delivery vehicle parking hours", id:"FAQ-0284", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"At Abu Dhabi Mall, are there designated areas for electric vehicle (EV) parking with charging stations?", a:"<p>Yes, there are designated parking spaces for electric vehicles, which include charging stations.</p>\n<p>Terms and Conditions for Parking at Abu Dhabi Mall.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking At Abu Dhabi Mall, are there designated areas for electric vehicle (EV) parking ", id:"FAQ-0276", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"Are there any specific rules for vehicles at Abu Dhabi Mall?", a:"<p>Vehicles without license plates are not allowed to park, and children’s cars or bikes are not allowed in parking spaces.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking Are there any specific rules for vehicles at Abu Dhabi Mall", id:"FAQ-0275", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"Who is eligible for premium parking permits?", a:"<p>There is <strong>no permit available</strong> for Premium parking.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking Who is eligible for premium parking permits", id:"FAQ-0266", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What happens if I park in an unauthorized area or block charging stations?", a:"<p>Parking in unauthorized areas, especially near charging stations, can result in <strong>fines</strong> or <strong>vehicle towing</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What happens if I park in an unauthorized area or block charging stations", id:"FAQ-0280", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What happens if I park outside designated areas?", a:"<p>Vehicles parked outside designated spaces may be fined and towed at the owner's expense.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What happens if I park outside designated areas", id:"FAQ-0278", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What happens if someone parks more than 13 hours at Abu Dhabi Mall?", a:"<p>If someone stays over 13 hours and leaves the mall and comes back after a short break, they would need to pay for parking again. They can access free parking during normal visiting hours (8:00 AM to 2:00 AM).</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What happens if someone parks more than 13 hours at Abu Dhabi Mall", id:"FAQ-0268", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"Can I park in designated spaces for People of Determination?", a:"<p>You can only park in these designated spaces if you have a valid <strong>People of Determination permit</strong>. A permit is required at all times.</p>\n<p>Failure to comply may result in the <strong>levying of fines</strong> and/or <strong>vehicle impoundment</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking Can I park in designated spaces for People of Determination", id:"FAQ-0279", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"How can i apply for POD permit?", a:"<p>You can apply for it from TAMM platform by following the below steps:</p>\n<p>TAMM app or website (TAMM - Log in Page):</p>\n<p>Sign In</p>\n<p>Services.</p>\n<p>Individuals / Emriti</p>\n<p>Social Care.</p>\n<p>PoD Support.</p>\n<p>Issuing a Parking Permit for People of Determination.</p>\n<p>Or by going to Zayed Higher organization for people of determination website and following the below steps:</p>\n<p>Go to Zayed Higher Organization then select apply for parking permit for POD and he will transferee you to fill the form in TAMM.</p>\n<h3>Required documents for Citizen POD</h3>\n<p>Emirates ID of POD person.</p>\n<p>Evidence of first- and second-degree kinship (if he is not the owner of the vehicle).</p>\n<p>Official letter from entities requesting to issue parking permit with POD details and vehicle details and used by the person of determination.</p>\n<p>Rental contract for a rented vehicle, or FAZZA contract.</p>\n<h3>Required Documents for Senior citizen POD</h3>\n<p>This service does not require any documents.</p>\n<h3>Required Documents for Parking Permit for Visitors and Tourists with Determination</h3>\n<p>The following documents must be submitted during the application.</p>\n<p>People of Determination card or People of Determination parking permit for tourists and visitors issued by their country.</p>\n<p>Rental contract for rented vehicle.</p>\n<p>Copy of vehicle licence registered outside UAE (Driving licence ).</p>\n<p>Link for Citizen POD: <a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/ApplyforaParkingPermitforPeopleofDetermination.\" target=\"_blank\">https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/ApplyforaParkingPermitforPeopleofDetermination.</a></p>\n<p>Link for Senior citizen POD: <a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/IssueParkingPermitforPeopleofDeterminationforSeniorEmiratis.\" target=\"_blank\">https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/IssueParkingPermitforPeopleofDeterminationforSeniorEmiratis.</a></p>\n<p>Link for Parking Permit for Visitors and Tourists with Determination: <a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/IssueParkingPermitforPeopleofDeterminationforVisitorsandTourists.\" target=\"_blank\">https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/IssueParkingPermitforPeopleofDeterminationforVisitorsandTourists.</a></p>\n<p>Link for Renewal of POD card: <a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/RenewaParkingPermitforPeopleofDetermination.\" target=\"_blank\">https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/RenewaParkingPermitforPeopleofDetermination.</a></p>\n<p>And for any additional inquiries related to POD permits you needs to contact Zayed Higher organization for people of determination.</p>\n<p>Website: <a href=\"https://www.za.gov.ae/\" target=\"_blank\">https://www.za.gov.ae/</a></p>\n<p>Via Email: <a href=\"/cdn-cgi/l/email-protection#4e272028210e34262160292138602f2b\"><span class=\"__cf_email__\" data-cfemail=\"573e393138172d3f3879303821793632\">[email&#160;protected]</span></a>.</p>\n<p>Via Phone: <strong>800 555</strong></p>\n<p>Location: 91, Al Ri'ayah St, Shakhbout City, Abu Dhabi 23647.</p>\n<p>People of Determination Parking Permit Inquiry System.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking How can i apply for POD permit", id:"FAQ-0285", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"How can visitors pay for parking?", a:"<p>Visitors can pay by scanning the QR code available on-site or by using the mall’s payment methods or visit <a href=\"https://freeflow.qmobility.ae.\" target=\"_blank\">https://freeflow.qmobility.ae.</a></p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking How can visitors pay for parking", id:"FAQ-0274", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What about weekends and public holidays?", a:"<p>Parking is free on weekends (Saturday &amp; Sunday) and public holidays from 6:00 AM to 2:00 AM.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What about weekends and public holidays", id:"FAQ-0283", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What are the rules for parking at Abu Dhabi Mall?", a:"<p>Vehicles must have license plates</p>\n<p>No vehicle should be left running for more than 30 minutes or unattended.</p>\n<p>Only designated areas are available for pick-up and drop-off.</p>\n<p>Stopping at entry and exit transit zones is prohibited.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What are the rules for parking at Abu Dhabi Mall", id:"FAQ-0277", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"Is there free parking for People of Determination?", a:"<p>Yes, valid People of Determination parking permits allow free parking at designated spaces.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking Is there free parking for People of Determination", id:"FAQ-0271", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What are the free parking hours at Abu Dhabi Mall?", a:"<p>The first 3 hours per day are free during Abu Dhabi Mall’s visiting hours (8:00 AM to 2:00 AM).</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What are the free parking hours at Abu Dhabi Mall", id:"FAQ-0272", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What are the parking payment methods at Abu Dhabi Mall?", a:"<p>Visitors can pay for parking by <strong>scanning a QR code</strong>.</p>\n<p>For complete hassle-free parking, <strong>DARB wallet auto deduction</strong> will be introduced soon.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What are the parking payment methods at Abu Dhabi Mall", id:"FAQ-0267", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What happens if I don’t pay for parking on time?", a:"<p>If you do not pay for parking, you will receive a <strong>fine</strong> as per applicable regulations.</p>\n<p>Visitors are required to pay parking fees to avoid fines. Fines will be applied after <strong>24 business hours</strong>.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What happens if I don’t pay for parking on time", id:"FAQ-0273", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
  {q:"What is the parking rate after the free hours?", a:"<p>The rate is <span class=\"amount\">AED 10</span> per hour or part of an hour.</p>\n<div class=\"footer\">\n<strong>Need help?</strong><br>\nCall/WhatsApp Q Mobility on <strong>800 3009</strong> or visit our dedicated support section on the <strong>DARB App</strong>.", q_ar:"", a_ar:"", kw:"Parking Private Parking What is the parking rate after the free hours", id:"FAQ-0270", page:"faq-priv-general", cat:"Private Parking", subcat:"Private Parking"},
];

// Mushrif Mall extra FAQs
var MUSHRIF_DATA = [
  {q:"What is the Free Flow Paid Parking system at Mushrif Mall?", a:`<p>The system is an <strong>AI-powered, fully automated parking solution</strong> that allows vehicles to enter and exit without stopping. There are no boom gates or ticket machines.</p><ul><li>Cameras read your license plate on entry and exit</li><li>For vehicles registered in Darb: fees are <strong>auto-deducted</strong> from the Darb wallet</li><li>For non-registered vehicles: pay within 24 hours via <a href="https://freeflow.qmobility.ae" target="_blank">freeflow.qmobility.ae</a> or scan the QR code</li></ul><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-001", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"How are parking fees paid at Mushrif Mall?", a:`<p><strong>For vehicles registered in Darb:</strong> Parking fees are automatically deducted from your Darb wallet.</p><p><strong>For non-registered vehicles:</strong> Pay within 24 hours of exit via:</p><ul><li><a href="https://freeflow.qmobility.ae" target="_blank">freeflow.qmobility.ae</a></li><li>Scanning the QR code at the exit</li></ul><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-002", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"Do I need to download an app to use Mushrif Mall parking?", a:`<p>Yes, you must download the <strong>Darb app</strong> and ensure your vehicle is registered with sufficient wallet balance to benefit from auto-deduction.</p><p>Non-Darb users can pay via the website or QR code after exit.</p><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-003", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"Is there a free parking period at Mushrif Mall?", a:`<p>Yes, the <strong>first 3 hours are free</strong> — once per day per visit.</p><div class="info-box">The free period applies once per day, regardless of whether you exit and re-enter.</div><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-004", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"What are the parking tariffs at Mushrif Mall?", a:`<p>During operating hours (<strong>6:00 AM – 2:00 AM</strong>):</p><table><tr><th>Duration</th><th>Fee</th></tr><tr><td>Up to 3 hours</td><td class="amount">Free (once per day)</td></tr><tr><td>3 to 7 hours</td><td class="amount">AED 10 per hour</td></tr><tr><td>More than 7 hours</td><td class="amount">AED 80 maximum per day</td></tr><tr><td>Night (2AM – 6AM)</td><td class="amount">AED 250 per night</td></tr><tr><td>Saturday, Sunday & holidays</td><td class="amount">Free (excl. night charges)</td></tr></table><div class="info-box">All fees are inclusive of VAT.</div><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-005", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"What is the maximum daily parking fee at Mushrif Mall?", a:`<p>If parking exceeds 7 hours, the maximum charge is <span class="amount">AED 80</span> per day within the same visit.</p><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-006", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"Can I park overnight (after 2:00 AM) at Mushrif Mall?", a:`<p>Yes, overnight parking from 2:00 AM to 6:00 AM is allowed. A fee of <span class="amount">AED 250</span> per night (or part thereof) applies.</p><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-007", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"Is parking free on weekends and public holidays at Mushrif Mall?", a:`<p>Yes, parking is <strong>free on Saturdays, Sundays, and public holidays</strong>.</p><div class="info-box">Note: Night parking charges (2AM–6AM) still apply even on holidays.</div><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-008", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"What happens if there is insufficient balance in the Darb wallet at Mushrif Mall?", a:`<p>If there is insufficient balance, you must <strong>top up your wallet and pay within 24 hours</strong> of exiting to avoid any violations or additional charges.</p><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-009", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"How can non-Darb registered vehicles pay for parking at Mushrif Mall?", a:`<p>Payment can be completed <strong>within 24 hours of exit</strong> via:</p><ul><li>Website: <a href="https://freeflow.qmobility.ae" target="_blank">freeflow.qmobility.ae</a></li><li>Scanning the QR code at exit</li></ul><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-010", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
  {q:"Who can I contact for Mushrif Mall parking inquiries?", a:`<p>Contact Q Mobility:</p><ul><li><strong>Call Center:</strong> 800 3009</li><li><strong>Email:</strong> customer.care@qmobility.ae</li></ul><div class="footer"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>`, id:"MM-011", page:"faq-mushrif", cat:"Private Parking", subcat:"Mushrif Mall"},
];

var OFFICIAL_NEW_FAQS = [
  // DARB — Al Qurm & Ghantout (24/7 gates — missing from original KB)
  {q:"Where are the Al Qurm and Ghantout toll gates located?", a:"<p><strong>Al Qurm Toll Gate:</strong> Located on Wahat Al Karama Street at the entrance and exit of Sheikh Zayed Road.</p><p><strong>Ghantout Toll Gate:</strong> Located on Sheikh Maktoum bin Rashid Road in the Ghantout area.</p><div class=\"info-box\"><strong>These two gates operate 24 hours a day, 7 days a week — including Sundays and public holidays.</strong></div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Toll General Information Al Qurm Ghantout toll gate location 24 7", id:"FAQ-AQGH-001", page:"faq-darb-general", cat:"DARB — General", subcat:"Toll Gates"},
  {q:"What are the alternative routes to avoid Al Qurm and Ghantout toll gates?", a:"<ul><li><strong>Al Qurm Toll Gate (Wahat Al Karama St):</strong> Drivers may use Sheikh Rashid bin Saeed Street or Al Khaleej Al Arabi Street as alternative routes.</li><li><strong>Ghantout Toll Gate (Sheikh Maktoum bin Rashid Road):</strong> Motorists can use Sheikh Mohammed bin Rashid Al Maktoum Road as an alternative route.</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Toll General Information Al Qurm Ghantout alternative route bypass", id:"FAQ-AQGH-002", page:"faq-darb-general", cat:"DARB — General", subcat:"Toll Gates"},
  {q:"Is there a speed limit on the toll gates?", a:"<p>Speed limits at toll gates are governed by the regulations of the competent authority — <strong>Abu Dhabi Police General Command</strong>. Standard road speed limits apply when passing through toll gates.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Toll General Information speed limit toll gate", id:"FAQ-SPD-001", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},
  {q:"What are the peak times for the 4 main toll gates during Ramadan?", a:"<p>During Ramadan, toll fees apply at different hours. Official peak hours are announced through Q Mobility's official channels.</p><p><strong>Al Qurm and Ghantout</strong> gates remain operational <strong>24 hours a day, 7 days a week</strong> throughout Ramadan.</p><div class=\"info-box\">Check <a href=\"https://www.qmobility.ae\" target=\"_blank\">qmobility.ae</a> for the latest Ramadan schedule.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Toll General Information Ramadan peak hours toll gate", id:"FAQ-RAM-001", page:"faq-darb-general", cat:"DARB — General", subcat:"General Info"},

  // DARB — Establishment registration
  {q:"Can an establishment register multiple vehicles at once?", a:"<p>Yes. Establishment accounts can click <strong>\"Register All Vehicles\"</strong> on the vehicles page, provided the wallet balance is sufficient to cover all registration fees.</p><p>Note: A separate account is required for each branch.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Toll Registration establishment register multiple vehicles bulk", id:"FAQ-EST-001", page:"faq-darb-reg", cat:"DARB — Registration", subcat:"Registration"},

  // Mawaqif — MSCP
  {q:"How does the Multi-Storey Car Park (MSCP) work?", a:"<p>Multi-storey public parking is available in some areas of Abu Dhabi Island. The system uses <strong>entrance and exit gates with cameras or ticket readers</strong>:</p><ol><li>Vehicle information is recorded electronically on entry</li><li>Park on any floor</li><li>On departure, the time is calculated and payment is made at a toll collection device</li><li>The gate opens automatically upon payment</li></ol><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking MSCP Multi Story Car Park how does it work", id:"FAQ-MSCP-001", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"MSCP"},
  {q:"How much does it cost to park in a Multi-Storey Car Park (MSCP)?", a:"<p>The rate is <span class=\"amount\">AED 2 per hour</span>, capped at <span class=\"amount\">AED 15 for 24 hours</span>.</p><div class=\"info-box\">Parking fees apply on weekends and public holidays as well.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking MSCP Multi Story Car Park cost fee rate", id:"FAQ-MSCP-002", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"MSCP"},
  {q:"Are there monthly subscriptions for Multi-Storey Car Parks (MSCP)?", a:"<table><tr><th>Duration</th><th>Fee</th></tr><tr><td>3 Months</td><td class=\"amount\">AED 1,369</td></tr><tr><td>6 Months</td><td class=\"amount\">AED 2,738</td></tr><tr><td>1 Year</td><td class=\"amount\">AED 5,475</td></tr></table><p>Permits are issued immediately. Renewal must be completed before the current permit expires. Anyone can apply.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking MSCP Multi Story Car Park monthly subscription permit fee", id:"FAQ-MSCP-003", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"MSCP"},
  {q:"Are there special parking spots in multi-storey car parks?", a:"<p>Yes. There are designated spots for <strong>People of Determination</strong> and <strong>women drivers</strong> in multi-storey car parks. These spots are clearly marked and reserved.</p><p>Wheelchairs are available at the Control Room.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking MSCP Multi Story Car Park People of Determination women spots", id:"FAQ-MSCP-004", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"MSCP"},

  // Mawaqif — Commercial Permits (new category)
  {q:"What is a Commercial Parking Permit?", a:"<p>A Commercial Permit allows businesses to apply for various parking services including:</p><ul><li>Parking reservation for construction &amp; infrastructure maintenance</li><li>Removal of PDM &amp; Mawaqif signage</li><li>Parking reservation for charity campaigns</li><li>Parking basement extension</li><li>Parking space removal</li><li>Sidewalk use for maintenance purposes</li><li>Parking reservation for eligible entities</li></ul><p>Applications are submitted through the <strong>TAMM platform</strong>.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Commercial Permit what is it business tamm", id:"FAQ-COM-001", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Commercial Permits"},
  {q:"How much do Commercial Parking Permits cost?", a:"<table><tr><th>Permit Type</th><th>Fee</th></tr><tr><td>Request submission fee (non-government)</td><td class=\"amount\">AED 200</td></tr><tr><td>Parking Reservation — Government, per space, per day</td><td class=\"amount\">AED 55</td></tr><tr><td>Parking Reservation — Government, per space, per 6 months</td><td class=\"amount\">AED 10,000</td></tr><tr><td>Parking Reservation — Government, per space, per year</td><td class=\"amount\">AED 20,000</td></tr><tr><td>Parking Reservation — Private, per space, per day</td><td class=\"amount\">AED 85</td></tr><tr><td>Parking Reservation — Private, per space, per 6 months</td><td class=\"amount\">AED 15,000</td></tr><tr><td>Parking Reservation — Private, per space, per year</td><td class=\"amount\">AED 30,000</td></tr><tr><td>Removing machine or signboard</td><td class=\"amount\">AED 2,000</td></tr></table><p>Processing takes <strong>3 working days</strong> once all documents and payment are provided.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Commercial Permit fees cost government private", id:"FAQ-COM-002", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Commercial Permits"},

  // Mawaqif — Car Pound
  {q:"What are the towing yards' working hours?", a:"<table><tr><th>Yard</th><th>Hours</th></tr><tr><td><strong>Al Karama Car Pound</strong></td><td>24 hours, 7 days a week</td></tr><tr><td><strong>Al Ain Car Pound</strong></td><td>8:00 AM – 12:00 AM (midnight), 7 days a week</td></tr><tr><td><strong>Musaffah Car Pound</strong></td><td>8:00 AM – 12:00 AM (midnight), 7 days a week</td></tr></table><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Car Pound towing yard hours working times", id:"FAQ-TOW-001", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},
  {q:"What is the towing fee and daily storage charge?", a:"<p>The towing fee is <span class=\"amount\">AED 500</span>.</p><p>If the vehicle is not released on the same day, a daily storage fee applies:</p><ul><li><strong>AED 100 per day</strong> for the first 30 days</li><li><strong>AED 500 per month</strong> for the next 5 months</li><li>After 6 months: storage fees stop, and the vehicle may be sold at public auction</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Car Pound towing fee storage daily charge", id:"FAQ-TOW-002", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},
  {q:"What payment methods are accepted at the car pound?", a:"<p>Payment can only be made <strong>in person</strong> at the pound customer service using a <strong>credit card only</strong>. Cash is not accepted.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Car Pound payment methods credit card cash", id:"FAQ-TOW-003", page:"faq-maw-pound", cat:"MAWAQIF — Car Pound", subcat:"Car Pound"},

  // Mawaqif — Paid Public Parking
  {q:"What are the public parking charges in Abu Dhabi?", a:"<table><tr><th></th><th>Standard Parking</th><th>Premium Parking</th></tr><tr><td><strong>Colors</strong></td><td>Black &amp; Blue</td><td>White &amp; Blue</td></tr><tr><td><strong>Rate</strong></td><td>AED 2/hr (max AED 15/24h)</td><td>AED 3/hr (max 4 hours stay)</td></tr><tr><td><strong>Hours</strong></td><td>8 AM – Midnight</td><td>8 AM – Midnight</td></tr><tr><td><strong>Free days</strong></td><td colspan=\"2\">Sundays &amp; public holidays</td></tr></table><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Paid Public Parking charges rates standard premium", id:"FAQ-PPP-001", page:"faq-maw-hours", cat:"MAWAQIF — Parking", subcat:"Parking Rates"},
  {q:"How do I pay for public parking?", a:"<p>You can pay for public parking using:</p><ul><li><strong>DARB mobile app</strong></li><li><strong>Parking Meters</strong> (accept coins, bank cards, and rechargeable cards)</li><li><strong>SMS</strong></li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Paid Public Parking how to pay app meter SMS", id:"FAQ-PPP-002", page:"faq-maw-hours", cat:"MAWAQIF — Parking", subcat:"Payment Methods"},
  {q:"How can I extend a parking ticket?", a:"<p>You can extend your ticket <strong>before it expires</strong>, after receiving a message that your ticket is about to expire.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Paid Public Parking extend ticket", id:"FAQ-PPP-003", page:"faq-maw-hours", cat:"MAWAQIF — Parking", subcat:"Payment Methods"},

  // ===== POD Permits — Mawaqif (properly tagged) =====
  {q:"What is the People of Determination (POD) Parking Permit?", a:"<p>The POD Parking Permit allows People of Determination to park in <strong>designated POD spaces</strong> across Abu Dhabi free of charge.</p><ul><li>For <strong>Abu Dhabi plate numbers</strong>: the POD card is linked to the vehicle — no physical card display needed</li><li>For <strong>other Emirates</strong>: the physical POD card must be <strong>visible at all times</strong></li></ul><div class=\"info-box\">For Mawaqif parking, <strong>no application is needed</strong> — the exemption is automatically linked to the POD card holder's vehicle.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD People of Determination parking permit what is mawaqif exemption", id:"FAQ-POD-001", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"How do I get a POD card to apply for a parking permit?", a:"<p>You first need to obtain your <strong>People of Determination (POD) Card</strong> from one of the following:</p><ul><li><strong>Zayed Higher Organization</strong> — <a href=\"https://www.za.gov.ae/\" target=\"_blank\">za.gov.ae</a> | Phone: 800 555</li><li><strong>Ministry of Community Empowerment</strong></li></ul><p>Once you have the POD card, you can proceed with the parking permit application through TAMM.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD People of Determination card how to get Zayed Higher Organization apply", id:"FAQ-POD-002", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"How do I apply for a Mawaqif POD parking permit?", a:"<h4>Via TAMM App or Website</h4><ol><li>Sign in at <a href=\"https://www.tamm.abudhabi\" target=\"_blank\">tamm.abudhabi</a></li><li>Services → Individuals / Emirati</li><li>Social Care → PoD Support</li><li>Select <strong>Issuing a Parking Permit for People of Determination</strong></li></ol><h4>Quick Links</h4><ul><li><a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/ApplyforaParkingPermitforPeopleofDetermination\" target=\"_blank\">Citizen POD Permit</a></li><li><a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/IssueParkingPermitforPeopleofDeterminationforSeniorEmiratis\" target=\"_blank\">Senior Citizen POD Permit</a></li><li><a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/IssueParkingPermitforPeopleofDeterminationforVisitorsandTourists\" target=\"_blank\">Visitors & Tourists POD Permit</a></li><li><a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/RenewaParkingPermitforPeopleofDetermination\" target=\"_blank\">Renew POD Permit</a></li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call Q Mobility: <strong>800 3009</strong> | Zayed Higher Org: <strong>800 555</strong></div>", q_ar:"", a_ar:"", kw:"POD People of Determination parking permit apply TAMM how to application steps", id:"FAQ-POD-003", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What documents are required for a Citizen POD parking permit?", a:"<ul><li><strong>Emirates ID</strong> of the POD person</li><li><strong>Evidence of 1st or 2nd degree kinship</strong> (if vehicle is not owned by the POD person)</li><li><strong>Official letter</strong> from entity requesting the permit (with POD and vehicle details), if applicable</li><li><strong>Rental contract</strong> for a rented vehicle, or FAZZA contract</li></ul><div class=\"info-box\">1st degree: Father, Mother, Spouse, Spouse's parents, Spouse's children<br>2nd degree: Grandfather, Grandmother, Brother, Sister, Grandchild</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD People of Determination parking permit documents citizen required Emirates ID kinship", id:"FAQ-POD-004", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What documents are required for a Senior Citizen POD parking permit?", a:"<p><strong>No documents are required</strong> for the Senior Citizen POD parking permit application.</p><div class=\"info-box\">Senior citizens are defined as UAE nationals aged <strong>60 years or above</strong>. The vehicle must be registered in their name.</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD Senior Citizen parking permit documents required none age 60", id:"FAQ-POD-005", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What documents are required for a Visitor/Tourist POD parking permit?", a:"<ul><li><strong>People of Determination card</strong> or POD parking permit issued by their country</li><li><strong>Rental contract</strong> for rented vehicle</li><li><strong>Copy of vehicle licence</strong> registered outside UAE (driving licence)</li></ul><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD visitor tourist parking permit documents required rental", id:"FAQ-POD-006", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"Is the Mawaqif POD parking permit free?", a:"<p>Yes. The POD parking permit is <strong>free of charge</strong>.</p><table><tr><th>Permit Type</th><th>Fee</th></tr><tr><td>People of Determination</td><td class=\"amount\">Free</td></tr><tr><td>Senior Citizen</td><td class=\"amount\">Free</td></tr><tr><td>Visitor/Tourist POD</td><td class=\"amount\">Free</td></tr></table><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD parking permit free cost fee payment", id:"FAQ-POD-007", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"How do I renew a POD parking permit?", a:"<p>Renewal is done through the TAMM platform:</p><p><a href=\"https://www.tamm.abudhabi/en/life-events/individual/SupportCommunityEnvironment/PoD-Support/RenewaParkingPermitforPeopleofDetermination\" target=\"_blank\">Renew POD Parking Permit on TAMM ↗</a></p><p>For additional inquiries contact Zayed Higher Organization:<br>📞 <strong>800 555</strong> | 🌐 <a href=\"https://www.za.gov.ae/\" target=\"_blank\">za.gov.ae</a></p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD parking permit renew renewal TAMM", id:"FAQ-POD-008", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What is the fine for parking in a POD space without a valid permit?", a:"<p>Parking in a space reserved for People of Determination without a valid POD permit carries a fine of:</p><div style=\"text-align:center;font-size:28px;font-weight:800;color:#c62828;padding:12px;\">AED 1,000</div><p>+ Immediate towing may apply.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD parking fine violation disabled space no permit AED 1000", id:"FAQ-POD-009", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"Does the DARB toll system also have a POD exemption?", a:"<p>Yes. People of Determination can apply for a <strong>DARB toll exemption</strong> through the Darb app:</p><ol><li>Open the <strong>Darb App</strong></li><li>Go to <strong>Requests → Add New Request</strong></li><li>Select <strong>Exemption → People of Determination</strong></li><li>Upload: POD Card + Emirates ID + Vehicle Registration + Proof of kinship (if applicable)</li></ol><p>The exemption covers <strong>one vehicle</strong> per POD card holder. It can be transferred between vehicles by first cancelling the exemption on the first vehicle.</p><div class=\"info-box\">POD holders may also qualify for an <strong>additional exemption</strong> if they meet another category (Senior Citizen, Retiree, Low Income).</div><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"POD DARB toll exemption people of determination apply Darb app", id:"FAQ-POD-010", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"POD Permits"},
  {q:"What is an Institution/Government Parking Permit?", a:"<p>These permits are issued to employees of government institutions and other approved organizations. They allow parking in designated areas near the institution without additional charges.</p><ul><li>Valid for <strong>1 year</strong></li><li>Cost: <span class=\"amount\">AED 1,200</span></li><li>Processing time: <strong>3 working days</strong> after payment</li><li>Permits can be transferred to another vehicle, but the request must go through the entity's contact person</li></ul><p>Each entity must assign a <strong>contact person</strong> to process the application with Q Mobility.</p><div class=\"footer\"><strong>Need help?</strong><br>Call/WhatsApp Q Mobility on <strong>800 3009</strong></div>", q_ar:"", a_ar:"", kw:"Parking Institution Government Permit employee organization", id:"FAQ-IGP-001", page:"faq-maw-permits", cat:"MAWAQIF — Permits", subcat:"Institution Permits"},
];

      await _sb.from('kb_data').upsert({key: 'kb_analytics', value: data, updated_at: new Date().toISOString()});
    } catch(e) {}
  },
  // Track a search query (fire-and-forget)
  trackSearch: function(query) {
    if (!query || query.length < 2) return;
    var self = this;
    self._get().then(function(data) {
      data.searches = data.searches || [];
      data.searches.push({q: query.toLowerCase().trim(), t: Date.now()});
      if (data.searches.length > 1000) data.searches = data.searches.slice(-1000);
      self._set(data);
    });
  },
  // Track a page/topic click (fire-and-forget)
  trackClick: function(page, label) {
    var self = this;
    self._get().then(function(data) {
      data.clicks = data.clicks || [];
      data.clicks.push({p: page, l: label || page, t: Date.now()});
      if (data.clicks.length > 1000) data.clicks = data.clicks.slice(-1000);
      self._set(data);
    });
  },
  // Sync versions used by the analytics dashboard (called from renderAnalytics)
  getSearchStats: function() {
    return ANALYTICS._syncCache ? Object.entries(
      (ANALYTICS._syncCache.searches||[]).reduce(function(acc,s){acc[s.q]=(acc[s.q]||0)+1;return acc;},{}))
      .sort(function(a,b){return b[1]-a[1];}) : [];
  },
  getClickStats: function() {
    return ANALYTICS._syncCache ? Object.entries(
      (ANALYTICS._syncCache.clicks||[]).reduce(function(acc,c){var k=c.l||c.p;acc[k]=(acc[k]||0)+1;return acc;},{}))
      .sort(function(a,b){return b[1]-a[1];}) : [];
  },
  getRecentSearches: function(n) {
    return ANALYTICS._syncCache ? (ANALYTICS._syncCache.searches||[]).slice(-(n||20)).reverse() : [];
  },
  // Load analytics into sync cache (called before rendering the analytics page)
  loadSync: async function() {
    ANALYTICS._syncCache = await ANALYTICS._get();
  },
  // Clear all analytics
  clear: async function() {
    ANALYTICS._syncCache = {};
    await _sb.from('kb_data').delete().eq('key', 'kb_analytics');
  },
  _syncCache: null
};

// ===== SUPABASE DATA LAYER — Full Mutation Persistence =====
// Strategy: store a complete "diff" that captures every admin action.
// On load, replay the diff on top of the base data so ALL users see the same state.
//
// Diff schema:
// {
//   custom_faqs:    { [id]: faqObject }        — new FAQs added by admin
//   edited_faqs:    { [id]: faqObject }        — built-in FAQs with full edits
//   deleted_faqs:   [id, ...]                  — FAQs removed by admin
//   faq_overrides:  { [id]: {page,cat,subcat}} — FAQ moved between pages
//   custom_topics:  { [sector]: [topicObj] }   — new topics added by admin
//   topic_overrides:{ [id]: overrideObj }      — built-in topic renamed/edited
//   topic_deletions:[id, ...]                  — built-in topics removed
// }

var _adminCache = {
  custom_faqs: {},
  edited_faqs: {},
  deleted_faqs: [],
  faq_overrides: {},
  custom_topics: {},
  topic_overrides: {},
  topic_deletions: []
};

// Apply a saved diff on top of the live FAQS/TOPICS arrays
function _applyAdminPayload(data) {
  if (!data) return;

  // 1. Add custom (admin-created) topics
  if (data.custom_topics) {
    for (var sk in data.custom_topics) {
      if (!TOPICS[sk]) TOPICS[sk] = [];
      data.custom_topics[sk].forEach(function(st) {
        if (!TOPICS[sk].find(function(x){return x.id===st.id;})) TOPICS[sk].push(st);
      });
    }
  }
  // Legacy: support old 'topics' key
  if (data.topics) {
    for (var sk0 in data.topics) {
      if (!TOPICS[sk0]) TOPICS[sk0] = [];
      data.topics[sk0].forEach(function(st) {
        if (!TOPICS[sk0].find(function(x){return x.id===st.id;})) TOPICS[sk0].push(st);
      });
    }
  }

  // 2. Apply topic overrides (renames, icon, desc, url, hide)
  if (data.topic_overrides) {
    for (var tid in data.topic_overrides) {
      var ov = data.topic_overrides[tid];
      for (var sk2 in TOPICS) {
        var t = TOPICS[sk2].find(function(x){return x.id===tid;});
        if (t) {
          if (ov.label_en  !== undefined) t.label_en  = ov.label_en;
          if (ov.label_ar  !== undefined) t.label_ar  = ov.label_ar;
          if (ov.icon      !== undefined) t.icon      = ov.icon;
          if (ov.desc_en   !== undefined) t.desc_en   = ov.desc_en;
          if (ov.desc_ar   !== undefined) t.desc_ar   = ov.desc_ar;
          if (ov.url       !== undefined) t.url       = ov.url;
          if (ov.hidden    !== undefined) t.hidden    = ov.hidden;
          break;
        }
      }
    }
  }

  // 3. Remove deleted topics
  if (data.topic_deletions && Array.isArray(data.topic_deletions)) {
    data.topic_deletions.forEach(function(tid) {
      for (var sk3 in TOPICS) {
        var idx = TOPICS[sk3].findIndex(function(t){return t.id===tid;});
        if (idx >= 0) { TOPICS[sk3].splice(idx, 1); break; }
      }
    });
  }

  // 4. Add custom (admin-created) FAQs
  var customFaqsMap = data.custom_faqs || {};
  // Legacy: support old 'faqs' array
  if (Array.isArray(data.faqs)) {
    data.faqs.forEach(function(sf){ customFaqsMap[sf.id] = sf; });
  }
  Object.keys(customFaqsMap).forEach(function(fid){
    var sf = customFaqsMap[fid];
    if (!FAQS.find(function(x){return x.id===sf.id;})) FAQS.push(sf);
  });

  // 5. Apply full edits to built-in FAQs (replaces the object in place)
  if (data.edited_faqs) {
    Object.keys(data.edited_faqs).forEach(function(fid){
      var edited = data.edited_faqs[fid];
      var idx = FAQS.findIndex(function(x){return x.id===fid;});
      if (idx >= 0) FAQS[idx] = edited;
    });
  }

  // 6. Remove deleted FAQs
  if (data.deleted_faqs && Array.isArray(data.deleted_faqs)) {
    data.deleted_faqs.forEach(function(fid){
      var idx = FAQS.findIndex(function(f){return f.id===fid;});
      if (idx >= 0) FAQS.splice(idx, 1);
    });
  }

  // 7. Apply FAQ page/cat/subcat moves
  if (data.faq_overrides) {
    for (var fid2 in data.faq_overrides) {
      var fov = data.faq_overrides[fid2];
      var f = FAQS.find(function(x){return x.id===fid2;});
      if (f) {
        if (fov.page   !== undefined) f.page   = fov.page;
        if (fov.cat    !== undefined) f.cat    = fov.cat;
        if (fov.subcat !== undefined) f.subcat = fov.subcat;
      }
    }
  }
}

// Persist the full _adminCache to Supabase
async function _persistCache() {
  try {
    await _sb.from('kb_data').upsert({
      key: 'kb_admin_data',
      value: _adminCache,
      updated_at: new Date().toISOString()
    });
  } catch(e) { console.error('_persistCache error', e); }
}

async function loadAdminData() {
  try {
    var res = await _sb.from('kb_data').select('value').eq('key', 'kb_admin_data').maybeSingle();
    if (res.data && res.data.value) {
      // Merge stored data into cache, filling in any missing keys
      var stored = res.data.value;
      _adminCache.custom_faqs     = stored.custom_faqs     || {};
      _adminCache.edited_faqs     = stored.edited_faqs     || {};
      _adminCache.deleted_faqs    = stored.deleted_faqs    || [];
      _adminCache.faq_overrides   = stored.faq_overrides   || {};
      _adminCache.custom_topics   = stored.custom_topics   || {};
      _adminCache.topic_overrides = stored.topic_overrides || {};
      _adminCache.topic_deletions = stored.topic_deletions || [];
      // Legacy support
      if (stored.topics) _adminCache.topics = stored.topics;
      if (stored.faqs)   _adminCache.faqs   = stored.faqs;
      _applyAdminPayload(_adminCache);
    }
  } catch(e) { console.log('loadAdminData error', e); }
}

// Called after ANY admin mutation — rebuilds payload and saves
async function saveAdminData() {
  // Rebuild custom_faqs and custom_topics from live arrays
  var customFaqs = {};
  FAQS.forEach(function(f){
    if (f.id && f.id.indexOf('ADMIN-') === 0) customFaqs[f.id] = f;
  });
  var customTopics = {};
  for (var sk in TOPICS) {
    var ct = TOPICS[sk].filter(function(t){return t.id && t.id.indexOf('ADMIN-') === 0;});
    if (ct.length > 0) customTopics[sk] = ct;
  }
  _adminCache.custom_faqs   = customFaqs;
  _adminCache.custom_topics = customTopics;
  await _persistCache();
}

// Topic override — persist a rename/icon/desc/url/hide change
async function setTopicOverride(topicId, override) {
  try {
    var cur = _adminCache.topic_overrides[topicId] || {};
    for (var k in override) cur[k] = override[k];
    _adminCache.topic_overrides[topicId] = cur;
    await _persistCache();
  } catch(e) { console.log('setTopicOverride err', e); }
}

// Topic deletion — mark a built-in topic as removed
async function addTopicDeletion(topicId) {
  try {
    if (_adminCache.topic_deletions.indexOf(topicId) < 0) _adminCache.topic_deletions.push(topicId);
    await _persistCache();
  } catch(e) { console.log('addTopicDeletion err', e); }
}

// FAQ override — persist a page/cat/subcat move
async function setFaqOverride(faqId, override) {
  try {
    _adminCache.faq_overrides[faqId] = override;
    await _persistCache();
  } catch(e) { console.log('setFaqOverride err', e); }
}

// Full FAQ edit — persist the entire updated FAQ object
async function persistFaqEdit(faqObj) {
  try {
    if (!faqObj || !faqObj.id) return;
    if (faqObj.id.indexOf('ADMIN-') === 0) {
      // Custom FAQ — store in custom_faqs
      _adminCache.custom_faqs[faqObj.id] = faqObj;
    } else {
      // Built-in FAQ — store full edited copy in edited_faqs
      _adminCache.edited_faqs[faqObj.id] = faqObj;
    }
    await _persistCache();
  } catch(e) { console.log('persistFaqEdit err', e); }
}

// FAQ deletion — mark as deleted so it's removed on load for all users
async function persistFaqDelete(faqId) {
  try {
    // Remove from custom_faqs if it was admin-created
    if (_adminCache.custom_faqs[faqId]) delete _adminCache.custom_faqs[faqId];
    // Remove from edited_faqs if it was edited
    if (_adminCache.edited_faqs[faqId]) delete _adminCache.edited_faqs[faqId];
    // Remove from faq_overrides
    if (_adminCache.faq_overrides[faqId]) delete _adminCache.faq_overrides[faqId];
    // Only record deletion for built-in FAQs (custom ones just removed from custom_faqs)
    if (faqId.indexOf('ADMIN-') !== 0) {
      if (_adminCache.deleted_faqs.indexOf(faqId) < 0) _adminCache.deleted_faqs.push(faqId);
    }
    await _persistCache();
  } catch(e) { console.log('persistFaqDelete err', e); }
}

async function resetAllAdminEdits() {
  if (!confirm('Reset ALL admin edits? This will restore the original KB content for everyone.')) return;
  try {
    _adminCache = {
      custom_faqs: {}, edited_faqs: {}, deleted_faqs: [],
      faq_overrides: {}, custom_topics: {}, topic_overrides: {}, topic_deletions: []
    };
    await _sb.from('kb_data').delete().eq('key', 'kb_admin_data');
    showToast('All admin edits cleared. Reloading…');
    setTimeout(function(){ location.reload(); }, 1500);
  } catch(e) { alert('Error: ' + e.message); }
}

function stripHtml(html) {
  if (!html) return '';
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}
function escHtml(t) {
  if (!t) return '';
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showExemptTab(tab) {
  document.querySelectorAll('.exempt-tab-content').forEach(function(el){el.style.display='none';});
  document.querySelectorAll('.services-tab').forEach(function(el){el.classList.remove('active');});
  if (tab === 'auto') { document.getElementById('exempt-auto').style.display='block'; document.getElementById('tab-auto').classList.add('active'); }
  if (tab === 'app') { document.getElementById('exempt-app').style.display='block'; document.getElementById('tab-app').classList.add('active'); }
  if (tab === 'not') { document.getElementById('exempt-not').style.display='block'; document.getElementById('tab-not').classList.add('active'); }
}

  else if (page === 'faq-maw-mussafah') renderMussafah(el);
  else if (page === 'faq-maw-mbz') renderMBZCity(el);
  else if (page === 'smart-map') renderSmartMap(el);
  else if (page === 'sms') renderSmsTemplates(el);
  else if (page === 'email') renderEmailTemplates(el);
  else if (page === 'darb-x') renderDarbX(el);
  else if (page === 'darb-exemptions') renderDarbExemptions(el);
  else if (page === 'faq-darb-exempt') renderDarbExemptions(el);
  else if (page === 'general') renderGeneral(el);
  else if (page === 'services') renderServices(el);
  else if (page === 'call-scripts') renderCallScripts(el);
  else if (page === 'admin-panel') renderAdminPanel(el);
  else if (page === 'admin-analytics') renderAnalytics(el);
  else if (page && page.indexOf('faq-') === 0) renderFaqPage(el, page);
  else el.innerHTML = '<div class="card"><p>Page not found: ' + escHtml(page) + '</p></div>';
}

// ===== SECTOR RENDERER =====
function renderSector(el, sectorId) {
  var sector = SECTORS.find(function(s){return s.id===sectorId;});
  var topics = TOPICS[sectorId] || [];

  // Filter out subcat for maw-parking if selected
  var filterFn = null;
  if (sectorId==='sector-maw' && S.subcat) {
    filterFn = function(f){
      if (f.cat) {
        var c = f.cat.toLowerCase();
        var sub = (f.subcat||'').toLowerCase();
        var kw = (f.kw||'').toLowerCase();
        if (S.subcat==='maw-payment') return c.indexOf('payment')>=0 || c.indexOf('pay for')>=0 || sub.indexOf('sms')>=0 || sub.indexOf('payment')>=0 || kw.indexOf('payment')>=0 || kw.indexOf('sms')>=0;
        if (S.subcat==='maw-permit') return c.indexOf('permit')>=0 || sub.indexOf('permit')>=0;
        if (S.subcat==='maw-grievance') return c.indexOf('grievance')>=0 || sub.indexOf('grievance')>=0;
        if (S.subcat==='maw-pound') return c.indexOf('pound')>=0 || sub.indexOf('pound')>=0;
        if (S.subcat==='maw-vehicle') return c.indexOf('vehicle')>=0 || sub.indexOf('vehicle')>=0;
        if (S.subcat==='maw-mscp') return c.indexOf('mscp')>=0 || sub.indexOf('mscp')>=0;
      }
      return false;
    };

// ===== FAQ CARD with optional highlighting, collapsible, and source badge =====
function renderFaqCard(f, highlightQuery) {
  var q = S.lang === 'ar' && f.q_ar ? f.q_ar : f.q;
  var a = S.lang === 'ar' && f.a_ar ? f.a_ar : f.a;
  var cardId = 'faq-' + f.id;

  // Highlight matching text without breaking HTML
  if (highlightQuery && typeof highlightQuery === 'string' && highlightQuery.length > 0) {
    var hq = highlightQuery.toLowerCase();
    var escHQ = escHtml(hq).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    try {
      var re = new RegExp('(' + escHQ + ')', 'gi');
      q = q.replace(re, '<mark>$1</mark>');
      if (a) {
        var parts = a.split(/(<[^>]+>)/g);
        for (var i = 0; i < parts.length; i++) {
          if (parts[i].charAt(0) !== '<') {
            parts[i] = parts[i].replace(re, '<mark>$1</mark>');
          }
        }
        a = parts.join('');
      }
    } catch(e) {}
  }

  // Source badge — verified for official FAQ pages
  var isOfficial = f.page && (f.page.indexOf('faq-darb') === 0 || f.page.indexOf('faq-maw') === 0);
  var sourceBadge = isOfficial
    ? '<span style="font-size:10px;background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;border-radius:10px;padding:2px 8px;margin-left:8px;vertical-align:middle;">✅ Verified</span>'
    : '';

  var r = '<div class="faq-card" id="' + f.id + '">';
  // Collapsible header
  r += '<div class="faq-q" style="cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;" onclick="toggleFaqBody(\'' + cardId + '\')">';
  r += '<span>' + (f.icon || '💬') + ' ' + q + sourceBadge + '</span>';
  r += '<span id="' + cardId + '-arrow" style="font-size:14px;color:var(--text2);flex-shrink:0;transition:transform .2s;margin-top:2px;">▾</span>';
  r += '</div>';
  r += '<div id="' + cardId + '-body">';
  r += '<div class="faq-a">' + a + '</div>';
  r += '<div class="faq-meta">';
  r += '<div class="faq-tags">';
  if (f.cat) r += '<span class="tag">' + escHtml(f.cat) + '</span>';
  if (f.subcat) r += '<span class="tag" style="background:var(--darb-l);color:var(--darb);">' + escHtml(f.subcat) + '</span>';
  r += '</div>';
  r += '<div><button class="btn" onclick="copyAnswer(\'' + f.id + '\')">' + t('copy') + '</button></div>';
  r += '</div>';
  if (S.admin) {
    r += '<div style="margin-top:8px">';
    r += '<button class="btn" onclick="editFaq(\'' + f.id + '\')" style="font-size:11px;margin-right:4px">Edit</button>';
    r += '<button class="btn" onclick="deleteFaq(\'' + f.id + '\')" style="font-size:11px;background:#c62828">Delete</button>';
    r += '</div>';
  }
  r += '</div>';
  r += '</div>';
  return r;
}

function toggleFaqBody(cardId) {
  var body = document.getElementById(cardId + '-body');
  var arrow = document.getElementById(cardId + '-arrow');
  if (!body) return;
  var isHidden = body.style.display === 'none';
  body.style.display = isHidden ? '' : 'none';
  if (arrow) arrow.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(-90deg)';
}

// ===== ENHANCED SEARCH with scoring, live-as-you-type, and keyword boosting =====
var _lastSearchQuery = '';
var _lastSearchResults = [];
var _currentSearchFilter = 'all';
var _searchDebounce = null;

function focusSearch() {
  var el = document.getElementById('searchInput');
  if (el) { el.focus(); el.select(); }
}

function onSearchInput() {
  clearTimeout(_searchDebounce);
  var q = document.getElementById('searchInput').value.trim();
  if (q.length < 2) return;
  _searchDebounce = setTimeout(function(){ doSearch(true); }, 300);
}

function doSearch(silent) {
  var q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  if (!silent) {
    go('search', 'Search: ' + q);
  } else {
    S.page = 'search';
    var el = document.getElementById('content');
    if (el) renderSearch(el, q);
  }
  _lastSearchQuery = q;
  _currentSearchFilter = 'all';
  if (!silent) {
    var el2 = document.getElementById('content');
    if (el2) renderSearch(el2, q);
  }
}

function _scoreResult(f, q) {
  var score = 0;
  var ql = q.toLowerCase();
  var words = ql.split(/\s+/).filter(function(w){return w.length>1;});

  function checkField(text, weight) {
    if (!text) return;
    var tl = text.toLowerCase();
    // Exact phrase match
    if (tl.indexOf(ql) >= 0) score += weight * 3;
    // All words present
    var allWords = words.every(function(w){return tl.indexOf(w)>=0;});
    if (allWords && words.length > 1) score += weight * 2;
    // Any word
    words.forEach(function(w){ if (tl.indexOf(w)>=0) score += weight; });
  }

  checkField(f.q, 10);       // Question title — highest weight
  checkField(f.kw, 8);       // Keywords
  checkField(f.cat, 5);      // Category
  checkField(f.subcat, 4);   // Subcategory
  checkField(f.a, 2);        // Answer body — lower weight (verbose)
  checkField(f.q_ar, 6);     // Arabic question
  checkField(f.a_ar, 1);

  return score;
}

function renderSearch(el, query) {
  var q = query.toLowerCase().trim();
  if (!q) return;
  ANALYTICS.trackSearch(query);
  _lastSearchQuery = query;

  // Score all FAQs
  var scored = [];
  FAQS.forEach(function(f){
    var s = _scoreResult(f, q);
    if (s > 0) scored.push({f:f, score:s});
  });
  scored.sort(function(a,b){return b.score - a.score;});
  var results = scored.map(function(x){return x.f;});
  _lastSearchResults = results;

  // Group by category for filter tabs
  var byCat = {};
  results.forEach(function(f){
    var c = f.cat || 'Other';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(f);
  });

  var h = '<div class="breadcrumb"><a onclick="goHome()">Home</a> / Search</div>';
  h += '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px;">';
  h += '<div class="page-title" style="margin:0">🔍 "' + escHtml(query) + '"</div>';
  h += '<span style="font-size:13px;color:var(--text2);">' + results.length + ' result' + (results.length===1?'':'s') + '</span>';
  h += '</div>';

  if (results.length === 0) {
    h += '<div class="card" style="padding:32px;text-align:center;">';
    h += '<div style="font-size:40px;margin-bottom:12px;">🔍</div>';
    h += '<div style="font-weight:700;margin-bottom:8px;">No results found for "' + escHtml(query) + '"</div>';
    h += '<div style="color:var(--text2);font-size:13px;margin-bottom:16px;">Try different keywords, or check the official source below.</div>';
    h += '<a href="https://www.qmobility.ae/en/faqs/darb-faqs" target="_blank" class="btn" style="margin-right:8px;background:var(--darb);">DARB FAQ ↗</a>';
    h += '<a href="https://www.qmobility.ae/en/faqs/mawaqif-faqs" target="_blank" class="btn">Mawaqif FAQ ↗</a>';
    h += '</div>';
    el.innerHTML = h;
    return;
  }

  // Category filter tabs
  var cats = Object.keys(byCat);
  if (cats.length > 1) {
    h += '<div class="search-tabs">';
    h += '<button class="search-tab' + (_currentSearchFilter==='all'?' active':'') + '" onclick="filterSearchResults(\'all\')">All (' + results.length + ')</button>';
    cats.forEach(function(c){
      h += '<button class="search-tab' + (_currentSearchFilter===c?' active':'') + '" onclick="filterSearchResults(\'' + escHtml(c).replace(/'/g,"\\'") + '\')">' + escHtml(c) + ' (' + byCat[c].length + ')</button>';
    });
    h += '</div>';
  }

  var filtered = _currentSearchFilter === 'all' ? results : (byCat[_currentSearchFilter] || []);
  var showCount = Math.min(filtered.length, 20);
  h += '<div class="faq-list" id="search-results">';
  for (var i = 0; i < showCount; i++) {
    h += renderFaqCard(filtered[i], query);
  }
  h += '</div>';

  if (filtered.length > 20) {
    h += '<button class="btn" style="margin-top:12px;" onclick="loadMoreSearch()">Load More (' + (filtered.length - 20) + ' more)</button>';
  }

  el.innerHTML = h;
}

function filterSearchResults(cat) {
  _currentSearchFilter = cat;
  renderSearch(document.getElementById('content'), _lastSearchQuery);
}

function loadMoreSearch() {
  var q = _lastSearchQuery.toLowerCase();
  var byCat = {};
  _lastSearchResults.forEach(function(f){
    var c = f.cat || 'Other';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(f);
  });
  var filtered = _currentSearchFilter === 'all' ? _lastSearchResults : (byCat[_currentSearchFilter] || []);
  var el = document.getElementById('search-results');
  if (!el) return;
  var h = '';
  for (var i = 0; i < filtered.length; i++) {
    h += renderFaqCard(filtered[i], _lastSearchQuery);
  }
  el.innerHTML = h;
  // Hide the load more button
  var btn = el.nextElementSibling;
  if (btn && btn.tagName === 'BUTTON') btn.style.display = 'none';
}

function renderEmailTemplates(el) {
  var h = '<div class="breadcrumb"><a onclick="goHome()">Home</a> / Email Templates</div>';
  h += '<div class="page-title">&#9993; Email Templates</div>';
  h += '<p style="color:var(--text2);font-size:13px;margin-bottom:12px;">Bilingual email templates for common customer service scenarios. Click <strong>Copy</strong> to use.</p>';

  // Categorize templates by ID prefix or content hint
  var groups = {
    'Mawaqif':   {color:'#2E7D32', icon:'&#128663;', items:[]},
    'DARB':      {color:'#1565C0', icon:'&#128739;', items:[]},
    'General':   {color:'#455A64', icon:'&#9993;', items:[]}
  };
  EMAIL_TEMPLATES.forEach(function(e){
    var label = (e.label_en || '').toLowerCase();
    var body = (e.en || '').toLowerCase();
    var bucket = 'General';
    if (label.indexOf('darb') >= 0 || label.indexOf('toll') >= 0 || label.indexOf('wallet') >= 0 || label.indexOf('exemption') >= 0 || body.indexOf('darb app') >= 0) {
      bucket = 'DARB';
    } else if (label.indexOf('parking') >= 0 || label.indexOf('permit') >= 0 || label.indexOf('fine') >= 0 || label.indexOf('mawaqif') >= 0 || body.indexOf('mawaqif') >= 0 || body.indexOf('tamm') >= 0) {
      bucket = 'Mawaqif';
    }
    groups[bucket].items.push(e);
  });

  // Search/filter
  h += '<div style="margin-bottom:16px;">';
  h += '<input type="text" id="emailFilter" placeholder="Filter templates..." oninput="filterEmailTemplates()" style="width:100%;max-width:400px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;">';
  h += '</div>';

  // Render each group
  ['Mawaqif','DARB','General'].forEach(function(gk){
    var g = groups[gk];
    if (g.items.length === 0) return;
    h += '<div class="email-group" data-group="' + gk + '" style="margin-bottom:24px;">';
    h += '<h3 style="color:' + g.color + ';border-bottom:2px solid ' + g.color + ';padding-bottom:6px;margin-bottom:12px;">' + g.icon + ' ' + gk + ' (' + g.items.length + ')</h3>';
    g.items.forEach(function(e){
      var isAr = S.lang === 'ar';
      var label = isAr && e.label_ar ? e.label_ar : e.label_en;
      var body = isAr && e.ar ? e.ar : e.en;
      var preview = body.length > 200 ? body.substring(0, 200) + '...' : body;
      var _eid = 'eml_' + e.id;
      window[_eid] = body;
      h += '<div class="email-card" data-label="' + escHtml(label.toLowerCase()) + '" style="border-left:4px solid ' + g.color + ';">';
      h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;flex-wrap:wrap;">';
      h += '<div><span style="background:' + g.color + ';color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;margin-right:8px;">' + escHtml(e.id) + '</span>';
      h += '<strong style="font-size:14px;">' + escHtml(label) + '</strong></div>';
      h += '<button class="btn" style="font-size:11px;padding:4px 10px;background:' + g.color + ';" onclick="copyText(window[&#39;' + _eid + '&#39;]);showToast(&#39;Template copied&#39;)">' + t('copy') + '</button>';
      h += '</div>';
      h += '<div class="email-body' + (isAr ? ' ar' : '') + '" style="background:#fafbfc;padding:10px 12px;border-radius:6px;font-size:12px;line-height:1.6;max-height:160px;overflow:auto;border:1px solid var(--border);">' + escHtml(preview).replace(/\n/g, '<br>') + '</div>';
      h += '</div>';
    });
    h += '</div>';
  });

  el.innerHTML = h;
}

function filterEmailTemplates() {
  var q = document.getElementById('emailFilter').value.toLowerCase();
  var cards = document.querySelectorAll('.email-card');
  cards.forEach(function(c){
    var label = c.getAttribute('data-label') || '';
    c.style.display = (!q || label.indexOf(q) >= 0) ? '' : 'none';
  });
  // Hide groups that have no visible cards
  document.querySelectorAll('.email-group').forEach(function(g){
    var visible = g.querySelectorAll('.email-card');
    var anyVis = false;
    visible.forEach(function(c){ if (c.style.display !== 'none') anyVis = true; });
    g.style.display = anyVis ? '' : 'none';
  });
}

    'Residential': {color:'#1565C0', icon:'&#127968;', rows:[]},

  };
  PERMITS.forEach(function(p){

    else if (t.indexOf('mscp') >= 0 || t.indexOf('multi-storey') >= 0 || t.indexOf('multi storey') >= 0) bucket = 'MSCP';
    groups[bucket].rows.push(p);
  });

  // Render each non-empty group as its own card
  ['Residential','Government','Commercial','Limited-Term','MSCP','Other'].forEach(function(gk){

      h += '<td><strong>' + escHtml(p.type||'') + '</strong></td>';

function showServiceTab(tabId) {
  document.querySelectorAll('.services-tab-content').forEach(function(el){el.style.display='none';});
  document.querySelectorAll('.services-tab').forEach(function(el){el.classList.remove('active');});
  var t = document.getElementById(tabId);
  if (t) t.style.display = 'block';
  // Find the button that triggered this
  var btns = document.querySelectorAll('.services-tab');
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute('onclick') && btns[i].getAttribute('onclick').indexOf(tabId)>=0) {
      btns[i].classList.add('active');
    }
  }
}

function openEditTopicModal(topicId) {
  var topic = null;
  var sk = null;
  for (var sk2 in TOPICS) {
    var found = TOPICS[sk2].find(function(t){return t.id===topicId;});
    if (found) { topic = found; sk = sk2; break; }
  }
  if (!topic) return;

  var body = '<div><label>Sector</label><select id="topicSector">';
  for (var s in TOPICS) {
    body += '<option value="' + s + '"' + (s===sk?' selected':'') + '>' + s + '</option>';
  }
  body += '</select></div>';
  body += '<div><label>Label EN</label><input type="text" id="topicLabelEn" value="' + escHtml(topic.label_en||'') + '"></div>';
  body += '<div><label>Label AR</label><input type="text" id="topicLabelAr" value="' + escHtml(topic.label_ar||'') + '"></div>';

  body += '<div><label>Description EN</label><input type="text" id="topicDescEn" value="' + escHtml(topic.desc_en||'') + '"></div>';
  body += '<div><label>Description AR</label><input type="text" id="topicDescAr" value="' + escHtml(topic.desc_ar||'') + '"></div>';
  body += '<div><label>Page</label><input type="text" id="topicPage" value="' + escHtml(topic.page||'') + '"></div>';
  body += '<div><label>External URL (optional)</label><input type="text" id="topicUrl" value="' + escHtml(topic.url||'') + '" placeholder="https://..."></div>';
  body += '<div style="margin-top:10px;font-size:11px;color:#666;">Tip: set URL to make this tab open an external link. Leave URL blank to use Page.</div>';
  body += '<input type="hidden" id="topicOldId" value="' + escHtml(topicId) + '">';
  body += '<input type="hidden" id="topicOldSector" value="' + escHtml(sk) + '">';
  body += '<div style="margin-top:10px"><button class="btn" onclick="saveTopic()">Save</button> <button class="btn" style="background:var(--text2)" onclick="hideTopicModal()">Cancel</button></div>';
  showTopicModal('Edit Topic', body);

function saveTopic() {
  var sector = document.getElementById('topicSector').value;
  var labelEn = document.getElementById('topicLabelEn').value.trim();
  var labelAr = document.getElementById('topicLabelAr').value.trim();
  var icon = document.getElementById('topicIcon').value.trim();
  var descEn = (document.getElementById('topicDescEn').value || '').trim();
  var descAr = (document.getElementById('topicDescAr').value || '').trim();
  var page = document.getElementById('topicPage').value.trim();
  var url = (document.getElementById('topicUrl').value || '').trim();

  if (!labelEn) { alert('Label EN is required'); return; }
  if (!page && !url) { alert('Either Page or External URL is required'); return; }

  var oldId = document.getElementById('topicOldId');
  var oldSector = document.getElementById('topicOldSector');

  if (oldId && oldId.value) {
    // Edit existing — save as override (works for built-in AND admin topics)
    var os = oldSector.value;
    var idx = TOPICS[os].findIndex(function(t){return t.id===oldId.value;});
    if (idx >= 0) {
      var t = TOPICS[os][idx];
      t.label_en = labelEn;
      t.label_ar = labelAr;
      t.icon = icon;
      t.desc_en = descEn;
      t.desc_ar = descAr;
      t.page = page;
      t.url = url || undefined;
      // Move to new sector if changed
      if (os !== sector) {
        TOPICS[os].splice(idx, 1);
        if (!TOPICS[sector]) TOPICS[sector] = [];
        TOPICS[sector].push(t);
      }
      // Persist as override (handles both built-in and admin)
      setTopicOverride(oldId.value, {
        label_en: labelEn, label_ar: labelAr, icon: icon,
        desc_en: descEn, desc_ar: descAr, url: url || ''
      });
    }
  } else {
    // Add new
    var newId = 'ADMIN-TOPIC-' + Date.now();
    if (!TOPICS[sector]) TOPICS[sector] = [];
    var newTopic = {id:newId, page:page, label_en:labelEn, label_ar:labelAr, icon:icon, desc_en:descEn, desc_ar:descAr};
    if (url) newTopic.url = url;
    TOPICS[sector].push(newTopic);
  }

  saveAdminData();
  hideTopicModal();
  render(S.page);
  buildNav();
  showToast('Topic saved ✓ (synced to all users)');
}

function deleteTopic(topicId) {
  if (!confirm('Delete topic ' + topicId + '? This will remove it for ALL users.')) return;
  // Count FAQs that would be orphaned
  var topicPage = null;
  for (var sk in TOPICS) {
    var t = TOPICS[sk].find(function(x){return x.id===topicId;});
    if (t) { topicPage = t.page; break; }
  }
  var orphanCount = topicPage ? FAQS.filter(function(f){return f.page===topicPage;}).length : 0;
  if (orphanCount > 0) {
    if (!confirm(orphanCount + ' FAQ(s) live on this page (' + topicPage + ') and will become unreachable. Continue?')) return;
  }
  for (var sk2 in TOPICS) {
    var idx = TOPICS[sk2].findIndex(function(t){return t.id===topicId;});
    if (idx >= 0) { TOPICS[sk2].splice(idx, 1); break; }
  }
  // Built-in topics: record deletion so it's replayed for all users on load
  if (topicId.indexOf('ADMIN-') !== 0) {
    addTopicDeletion(topicId);
  }
  saveAdminData();
  render(S.page);
  buildNav();
  showToast('Topic deleted ✓ (synced to all users)');
}

// ===== TOPIC MOVER: move FAQs between tabs/pages =====
function openMoveFaqModal() {
  if (!S.admin) { showToast('Admin login required'); return; }
  // Build sector→topics→pages list
  var pageMap = {};   // page -> "Sector / Topic"
  for (var sk in TOPICS) {
    TOPICS[sk].forEach(function(t){
      if (t.page && !t.url) {
        var sname = sk.replace('sector-','').toUpperCase();
        pageMap[t.page] = sname + ' / ' + (t.label_en || t.page);
      }
    });
  }
  var pageOptions = '';
  Object.keys(pageMap).sort().forEach(function(p){
    pageOptions += '<option value="' + escHtml(p) + '">' + escHtml(pageMap[p]) + ' (' + p + ')</option>';
  });

  var body = '<div style="font-size:13px;color:#666;margin-bottom:12px;">Move a single FAQ to a different page (tab), or bulk-move all FAQs from one page to another.</div>';
  body += '<div style="border-bottom:1px solid #eee;padding-bottom:14px;margin-bottom:14px;">';
  body += '<h4 style="margin:0 0 8px 0;">Move ONE FAQ</h4>';
  body += '<div><label>FAQ ID (e.g. FAQ-0039)</label><input type="text" id="mvFaqId" placeholder="Type or paste FAQ ID"></div>';
  body += '<div><label>New page</label><select id="mvFaqPage">' + pageOptions + '</select></div>';
  body += '<div><label>New subcategory (optional)</label><input type="text" id="mvFaqSubcat" placeholder="leave blank to keep current"></div>';
  body += '<div style="margin-top:8px"><button class="btn" onclick="executeMoveSingle()">Move FAQ</button></div>';
  body += '</div>';
  body += '<div>';
  body += '<h4 style="margin:0 0 8px 0;">Move ALL FAQs from a page</h4>';
  body += '<div><label>From page</label><select id="mvBulkFrom">' + pageOptions + '</select></div>';
  body += '<div><label>To page</label><select id="mvBulkTo">' + pageOptions + '</select></div>';
  body += '<div style="margin-top:8px"><button class="btn" onclick="executeMoveBulk()">Move All</button></div>';
  body += '</div>';
  showTopicModal('Move FAQs Between Tabs', body);
}

function executeMoveSingle() {
  var fid = document.getElementById('mvFaqId').value.trim();
  var newPage = document.getElementById('mvFaqPage').value;
  var newSub = document.getElementById('mvFaqSubcat').value.trim();
  if (!fid) { alert('FAQ ID required'); return; }
  var f = FAQS.find(function(x){return x.id===fid;});
  if (!f) { alert('FAQ not found: ' + fid); return; }
  if (!confirm('Move "' + (f.q||fid).substring(0,60) + '" from ' + f.page + ' to ' + newPage + '?')) return;
  f.page = newPage;
  if (newSub) f.subcat = newSub;
  // Persist full FAQ state (page change visible to all users)
  persistFaqEdit(f);
  setFaqOverride(fid, {page: newPage, cat: f.cat, subcat: newSub || f.subcat});
  hideTopicModal();
  render(S.page);
  showToast('FAQ moved ✓ (synced to all users)');
}

function executeMoveBulk() {
  var from = document.getElementById('mvBulkFrom').value;
  var to = document.getElementById('mvBulkTo').value;
  if (from === to) { alert('From and To must be different'); return; }
  var affected = FAQS.filter(function(f){return f.page===from;});
  if (affected.length === 0) { alert('No FAQs on that page'); return; }
  if (!confirm('Move ' + affected.length + ' FAQ(s) from ' + from + ' to ' + to + '? This affects ALL users.')) return;
  affected.forEach(function(f){
    f.page = to;
    persistFaqEdit(f);
    setFaqOverride(f.id, {page: to, cat: f.cat, subcat: f.subcat});
  });
  hideTopicModal();
  render(S.page);
  showToast(affected.length + ' FAQs moved ✓ (synced to all users)');
}

  body += '<div style="margin-top:12px"><button class="btn" onclick="saveFaq()">Save</button> <button class="btn" style="background:var(--text2)" onclick="hideFaqModal()">Cancel</button></div>';
