function saveFaq() {
  var id = document.getElementById('faqId').value.trim();
  var q = document.getElementById('faqQ').value.trim();
  var a = document.getElementById('faqA').value.trim();
  var qAr = document.getElementById('faqQAr').value.trim();
  var aAr = document.getElementById('faqAAr').value.trim();
  var cat = document.getElementById('faqCat').value.trim();
  var subcat = document.getElementById('faqSubcat').value.trim();
  var page = document.getElementById('faqPage').value.trim();
  var kw = document.getElementById('faqKw').value.trim();

  if (!id || !q || !a) { alert('ID, Question EN and Answer EN are required'); return; }

  var entry = {
    id:id, q:q, a:a, q_ar:qAr||q, a_ar:aAr||a,
    cat:cat||'General', subcat:subcat||'', page:page||'faq-maw-others', kw:kw||'', icon:'&#128231;'
  };

  var existing = FAQS.findIndex(function(x){return x.id===id;});
  if (existing >= 0) {
    FAQS[existing] = entry;
  } else {
    FAQS.push(entry);
  }

  // Persist to Supabase — visible to ALL users immediately
  persistFaqEdit(entry);
  saveAdminData();
  hideFaqModal();
  render(S.page);
  showToast('FAQ saved ✓ (synced to all users)');
}

function deleteFaq(faqId) {
  if (!confirm('Delete FAQ ' + faqId + '? This will remove it for ALL users.')) return;
  var idx = FAQS.findIndex(function(f){return f.id===faqId;});
  if (idx >= 0) FAQS.splice(idx, 1);
  // Persist deletion to Supabase — all users will no longer see this FAQ
  persistFaqDelete(faqId);
  render(S.page);
  showToast('FAQ deleted ✓ (synced to all users)');
}

function saveTableEditFromModal(tableName) {
  var jsonData = document.getElementById('tableEditData').value;
  saveTableEdit(tableName, jsonData);
  hideTopicModal();
}

async function saveTableEdit(tableName, jsonData) {
  if (!S.admin) { showToast('Admin login required'); return; }
  try {
    var data = JSON.parse(jsonData);
    await _sb.from('kb_data').upsert({key: 'kb_table_' + tableName, value: data, updated_at: new Date().toISOString()});
    showToast(tableName + ' updated');
    render(S.page);
  } catch(e) {
    alert('Invalid JSON: ' + e.message);
  }
}

async function loadTableData(tableName, defaultData) {
  try {
    var res = await _sb.from('kb_data').select('value').eq('key', 'kb_table_' + tableName).maybeSingle();
    return (res.data && res.data.value) ? res.data.value : defaultData;
  } catch(e) { return defaultData; }
}

// ===== INIT =====
async function init() {
  var urlP = location.search.match(/[?&]p=([^&]+)/);
  if (urlP && urlP[1]) S.page = decodeURIComponent(urlP[1]);

  // Show loading state while fetching from Supabase
  document.getElementById('content').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px;"><div style="font-size:36px;">⏳</div><p style="color:var(--text2);font-size:14px;">Loading Knowledge Base…</p></div>';

  await loadAdminData();
  buildNav();
  render(S.page);

  // ── Real-time sync: poll Supabase every 30s for admin changes ──
  // Non-admin users get a silent reload; admin users get a toast prompt.
  var _lastUpdatedAt = null;
  async function _checkForUpdates() {
    try {
      var res = await _sb.from('kb_data')
        .select('updated_at')
        .eq('key', 'kb_admin_data')
        .maybeSingle();
      if (!res.data) return;
      var ts = res.data.updated_at;
      if (_lastUpdatedAt === null) { _lastUpdatedAt = ts; return; }
      if (ts !== _lastUpdatedAt) {
        _lastUpdatedAt = ts;
        if (S.admin) {
          // Admin made the change themselves — already up to date, skip
          return;
        }
        // Non-admin: silently reload the data and re-render current page
        await loadAdminData();
        render(S.page);
        buildNav();
      }
    } catch(e) {}
  }
  setInterval(_checkForUpdates, 30000); // every 30 seconds

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e){
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      focusSearch();
    }
    if (e.key === 'Escape') {
      hideAdminModal();
      hideTopicModal();
      hideFaqModal();
    }
  });
}

// Start
init();
